name: Tests, Package, and Deployment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ["v*"]

env:
  PKG_NAME: neunorm
  MODULE_NAME: neunorm

jobs:
  tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14] # macos-14 = Apple Silicon (osx-arm64)
    env:
      # Scoped to this job so the upload step can gate on the secret's presence
      # (secrets are withheld on fork PRs); avoids mapping it into other jobs.
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.70.1
          manifest-path: pyproject.toml
          frozen: true

      - name: Run unit tests
        run: pixi run test

      # Uploads coverage.xml (produced by --cov-report=xml) to Codecov. Skipped when
      # CODECOV_TOKEN is absent (e.g. fork PRs, where secrets are withheld) so it does
      # not emit warnings; fail_ci_if_error=false keeps CI green regardless. See #139.
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]' && env.CODECOV_TOKEN != ''
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  conda-build:
    name: Build conda package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.70.1
          manifest-path: pyproject.toml
          frozen: true

      - name: Build conda package
        run: |
          pixi run conda-build
          mkdir -p /tmp/local-channel/linux-64
          cp *.conda /tmp/local-channel/linux-64

      - name: Verify conda package
        uses: neutrons/conda-verify@e1b26a86406e34b371fd633f9993c390f662910d # main
        with:
          package-name: ${{ env.PKG_NAME }}
          module-name: ${{ env.MODULE_NAME }}
          local-channel: /tmp/local-channel
          python-version: "3.11"

      - name: Upload conda package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-conda-package
          path: ${{ env.PKG_NAME }}-*.conda

  publish:
    name: Upload package to anaconda
    runs-on: ubuntu-latest
    needs: [tests, conda-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.70.1
          manifest-path: pyproject.toml
          frozen: true

      - name: Download conda package artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact-conda-package

      - name: Upload package to anaconda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          IS_RC: ${{ contains(github.ref, 'rc') }}
        run: |
          # label is main or rc depending on the tag-name
          CONDA_LABEL="main"
          if [ "${IS_RC}" = "true" ]; then CONDA_LABEL="rc"; fi
          echo pushing ${{ github.ref }} with label $CONDA_LABEL
          pixi run anaconda upload --label $CONDA_LABEL --user neutronimaging ${{ env.PKG_NAME }}-*.conda

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: tests
    # Must match the "Environment name" on the PyPI trusted publisher exactly;
    # the publish step's OIDC claims include this environment.
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.70.1
          manifest-path: pyproject.toml
          frozen: true

      - name: Build pypi package
        run: |
          # build the package
          VERSION=$(pixi run -- versioningit .)
          pixi run pypi-build
      # publish your distributions here (need to setup on PyPI first)
      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Tolerate re-runs of a release tag: files already on PyPI are skipped
          # instead of failing the whole job (PyPI uploads are immutable).
          skip-existing: true
