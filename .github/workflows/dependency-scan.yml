name: Dependency scan (Grype)

# The dependency-audit gate: a Grype scan of the built conda package's full
# dependency closure. Replaced the pip-audit check in test_and_deploy.yaml
# (2026-06-16) — gates on fixable findings (fail-build). Runs on PRs + pushes
# to the promotion branches + a weekly schedule.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write # for SARIF upload to code scanning
  actions: read

jobs:
  dependency-scan:
    name: Scan dependencies with Grype
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: v0.70.1
          manifest-path: pyproject.toml
          frozen: true

      - name: Build conda package
        run: |
          pixi run conda-build
          mkdir -p /tmp/local-channel/linux-64
          cp *.conda /tmp/local-channel/linux-64

      - name: Install built conda package
        id: install
        uses: neutrons/conda-actions/pkg-install@bba9ca89d48d9ae846db9650cc63fde736340b3d # v2
        with:
          package-name: neunorm
          local-channel: /tmp/local-channel

      - name: Scan installed environment with Grype
        uses: neutrons/conda-actions/grype@bba9ca89d48d9ae846db9650cc63fde736340b3d # v2
        with:
          path: ${{ steps.install.outputs.conda_install_dir }}
          # gate on fixable findings; only-fixed defaults true in the v2
          # wrapper, so unfixable advisories never fail the build
          fail-build: true
